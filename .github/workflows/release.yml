name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ============================================
  # Backend: Go binary per platform
  # ============================================
  backend:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          VERSION=$(grep '^backend=' VERSION | cut -d= -f2)
          EXT=""; if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          OUT="reconciler-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "${OUT}" ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: reconciler-*

  # ============================================
  # Frontend: platform-independent web build
  # ============================================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }

      - name: Build
        working-directory: web
        run: npm ci && npm run build

      - name: Package
        run: |
          VERSION=$(grep '^frontend=' VERSION | cut -d= -f2)
          tar -czf "frontend-${VERSION}.tar.gz" -C web/dist .

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-release
          path: frontend-*.tar.gz

  # ============================================
  # Desktop: thin Electron shell (no bundled backend/frontend)
  # Downloads components from GitHub Releases at runtime
  # ============================================
  desktop:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            electron_args: "--linux"
          - runner: macos-latest
            electron_args: "--mac --arm64"
          - runner: windows-latest
            electron_args: "--win"

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }

      - name: Build Electron
        working-directory: desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm version $(grep '^desktop=' ../VERSION | cut -d= -f2) --no-git-tag-version --allow-same-version
          npm install
          npx electron-builder ${{ matrix.electron_args }} --publish always

  # ============================================
  # Publish standalone backend + frontend to release
  # ============================================
  publish:
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: frontend-release

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            reconciler-*
            frontend-*
