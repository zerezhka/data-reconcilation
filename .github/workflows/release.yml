name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Job 1: Build Go backend binaries (all platforms) + frontend embedded
  backend:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: macos-13
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Embed frontend
        run: |
          rm -rf cmd/server/static/*
          cp -r web/dist/* cmd/server/static/

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          mkdir -p bin/${{ matrix.goos }}
          go build -ldflags "-s -w" -o bin/${{ matrix.goos }}/reconciler${EXT} ./cmd/server
          # Also create a named artifact for the release
          cp bin/${{ matrix.goos }}/reconciler${EXT} reconciler-${{ matrix.suffix }}${EXT}

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.suffix }}
          path: reconciler-${{ matrix.suffix }}*

  # Job 2: Build Electron desktop shells (per platform, uses backend from job 1)
  desktop:
    needs: backend
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            suffix: linux-amd64
            electron_args: "--linux"
          - os: macos-13
            goos: darwin
            suffix: darwin-amd64
            electron_args: "--mac --x64"
          - os: macos-latest
            goos: darwin
            suffix: darwin-arm64
            electron_args: "--mac --arm64"
          - os: windows-latest
            goos: windows
            suffix: windows-amd64
            electron_args: "--win"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ matrix.suffix }}
          path: bin/${{ matrix.goos }}/

      - name: Make binary executable
        if: matrix.goos != 'windows'
        run: chmod +x bin/${{ matrix.goos }}/reconciler-${{ matrix.suffix }}

      - name: Rename binary for electron-builder
        run: |
          cd bin/${{ matrix.goos }}
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          mv reconciler-${{ matrix.suffix }}${EXT} reconciler${EXT}
        shell: bash

      - name: Build Electron
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm version $(cat ../VERSION) --no-git-tag-version --allow-same-version
          npm ci
          npx electron-builder ${{ matrix.electron_args }} --publish always

  # Job 3: Publish standalone backend binaries to the same release
  publish-backend:
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: Download all backend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: reconciler-*
